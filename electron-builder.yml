appId: ventures.interspace.exobase
productName: Exobase
directories:
  buildResources: build
  output: dist
files:
  - build/**/*
  - package.json
  - node_modules/**/*
  - icons/**
  - electron-update.yml
extraMetadata:
  main: build/electron/main/index.mjs
asarUnpack:
  - resources/**
  - build/client/**/*
  - build/server/**/*
  - electron-update.yml

mac:
  icon: assets/icons/icon.icns
  target:
    - dmg
  identity: null
  category: "public.app-category.developer-tools"
  type: "distribution"
  hardenedRuntime: true
  entitlements: "assets/entitlements.mac.plist"
  entitlementsInherit: "assets/entitlements.mac.plist"
  gatekeeperAssess: false

npmRebuild: false

publish:
  provider: github
  owner: heyinterspace
  repo: exobase
  private: true
  releaseType: release

electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
